name: Bug Report
description: Report a reproducible defect in imgui-platform-kit
title: "[Bug] <short description>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) does this affect?
      multiple: true
      options:
        - Windows (DirectX 12)
        - Linux (GLFW/OpenGL3)
        - macOS (GLFW/OpenGL3)
        - All platforms
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Version of imgui-platform-kit (e.g. v1.0.0)
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Construct UserInterfaceParameters with ...
        2. Call initialize()
        3. Observe that ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, CMake, and vcpkg details.
      placeholder: |
        OS: Windows 11 / Ubuntu 22.04 / macOS 14
        Compiler: MSVC 19.x / GCC 13 / Clang 16
        CMake: 3.28
        vcpkg commit: abc1234

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, code snippets, or links to related issues.
