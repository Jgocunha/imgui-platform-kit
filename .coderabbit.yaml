language: en-US

reviews:
  auto_review:
    enabled: true
    drafts: false

  instructions: |
    This is **imgui-platform-kit**, a cross-platform C++20 library that wraps Dear ImGui
    with platform backends: Windows (DirectX 12 via Win32), Linux and macOS (GLFW + OpenGL3).
    vcpkg packages: imgui (docking-experimental, platform-specific bindings), implot,
    imgui-node-editor, catch2.

    Key public API surface (include/):
    - UserInterface — initialize(), render(), shutdown(), addWindow<T>()
    - UserInterfaceParameters — WindowParameters, FontParameters, StyleParameters,
      IconParameters, BackgroundImageParameters
    - UserInterfaceWindow — abstract base for custom windows
    - LogWindow — addLog(), clearLogs(), getLogCount()
    - colour_palette.h, themes.h — constants and Theme enum

    Review every PR for the following, posting inline comments on the relevant lines:

    **Code style**
    - Match the existing snake_case naming and namespace (`imgui_kit`).
    - No raw owning pointers — std::shared_ptr / std::unique_ptr only.
    - Small focused functions with a single responsibility.
    - No comments that explain *what*; only add one if the *why* is non-obvious.
    - C++20 idioms preferred (ranges, concepts, structured bindings, std::span, etc.).

    **Platform guards**
    - Platform-specific code must be guarded: `#if defined(_WIN32)` /
      `#elif defined(__APPLE__)` / `#elif defined(__linux__)`.
    - Changes to one backend (e.g. DX12) should be mirrored in the GLFW/OpenGL3
      backends unless the feature is genuinely platform-exclusive.

    **Test coverage**
    - Changes to parameters, window behaviour, themes, or utilities must have
      corresponding tests in `imgui-platform-kit/tests/` (Catch2).
    - Flag any new public functions or changed behaviour without corresponding tests.

    **Documentation**
    - New or changed public functions/classes/structs under `include/` need Doxygen
      blocks with at minimum `@brief`, one `@param` per parameter, and `@return`
      (unless void).
    - Flag missing or stale Doxygen.

    **External contributors (FIRST_TIME_CONTRIBUTOR or no prior contributions):**
    Open your review comment with a short, welcoming paragraph that thanks the author
    and notes that a maintainer will do a final review once CI is green. Keep the
    overall tone encouraging and constructive.

  path_filters:
    - "!build/**"
    - "!imgui-platform-kit/build/**"
    - "!vcpkg/**"
    - "!**/compile_commands.json"
    - "!CMakeCache.txt"
    - "!**/CMakeFiles/**"

chat:
  auto_reply: true
